name: app_infiltrazioni
description: App per sopralluoghi infiltrazioni con autosalvataggio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  speech_to_text: ^6.6.0
  image_picker: ^1.0.7
  path_provider: ^2.1.3
  path: ^1.9.0
  share_plus: ^10.1.0
  file_picker: ^8.1.2
  painter: ^2.0.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  web:
    generate: true
    image_path: "assets/icona.png"
  image_path: "assets/icona.png"
  min_sdk_android: 21 

flutter:
  uses-material-design: true
  assets:
    - assets/
