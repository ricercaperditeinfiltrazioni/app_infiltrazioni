name: Build Flutter APK and Web

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Scarica il codice
      uses: actions/checkout@v4

    - name: Imposta Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Installa Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Abilita il supporto web in Flutter
      run: flutter config --enable-web

    - name: Crea piattaforme
      run: flutter create . --platforms=android,web

    - name: Ottieni pacchetti pub
      run: flutter pub get

    - name: Genera Icona Personalizzata
      run: flutter pub run flutter_launcher_icons:main

    - name: Compila APK Android
      run: flutter build apk --release

    - name: Carica APK
      uses: actions/upload-artifact@v4
      with:
        name: app-infiltrazioni-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Compila la versione Web
      run: flutter build web --release --base-href "/app_infiltrazioni/"

    - name: Carica Web App
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy su GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
